<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>BUFFER ZONE · Login &amp; Signup</title>

    <!-- Manifest link -->
    <link rel="manifest" href="manifest.json" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .app-wrap {
            width: 100%;
            max-width: 580px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-logo {
            width: 100%;
            max-width: 400px;
            height: auto;
            display: block;
            margin: 0 auto 12px;
            border-radius: 8px;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #000000;
            text-transform: uppercase;
        }

        .brand .sub {
            font-size: 14px;
            font-weight: 300;
            color: rgba(0, 0, 0, 0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.06), transparent);
            margin: 6px 0 24px;
            width: 100%;
        }

        .view {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .view--hidden {
            display: none;
        }

        .view--active {
            display: flex;
        }

        .form-group {
            position: relative;
            margin-bottom: 18px;
            width: 100%;
        }

        .form-group .label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.40);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .form-group .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 14px;
            transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group .input-wrap:focus-within {
            border-color: rgba(0, 0, 0, 0.20);
            background: rgba(0, 0, 0, 0.05);
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.02);
        }

        .form-group .input-wrap .icon {
            position: absolute;
            left: 16px;
            color: rgba(0, 0, 0, 0.20);
            font-size: 16px;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .form-group .input-wrap:focus-within .icon {
            color: rgba(0, 0, 0, 0.50);
        }

        .form-group .input-wrap input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 15px;
            font-weight: 400;
            color: #000000;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
        }

        .form-group .input-wrap input::placeholder {
            color: rgba(0, 0, 0, 0.15);
            font-weight: 300;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
        }

        .toggle-pass {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: rgba(0, 0, 0, 0.20);
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-pass:hover {
            color: rgba(0, 0, 0, 0.55);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #000000;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease, box-shadow 0.3s ease, background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 4px;
            position: relative;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            background: #1a1a1a;
        }

        .btn-primary:active {
            transform: translateY(0px);
        }

        .btn-primary.loading .btn-text {
            visibility: hidden;
        }

        .btn-primary.loading::after {
            content: '';
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #ffffff;
            animation: spin 0.9s linear infinite;
            border: 2.5px solid rgba(255, 255, 255, 0.15);
            border-top-color: #ffffff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status-msg {
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 0 0;
            min-height: 32px;
            color: rgba(0, 0, 0, 0.20);
            transition: color 0.3s ease;
        }

        .status-msg.error {
            color: #c92a2a;
        }

        .status-msg.success {
            color: #2b8a3e;
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.30);
        }

        .toggle-link a {
            color: #000000;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            padding-bottom: 2px;
            transition: color 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
        }

        .toggle-link a:hover {
            color: #333333;
            border-bottom-color: #333333;
        }

        .toggle-link a i {
            margin-right: 6px;
        }

        .forgot-link {
            text-align: right;
            margin-top: 6px;
            font-size: 13px;
        }

        .forgot-link a {
            color: rgba(0, 0, 0, 0.30);
            text-decoration: none;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .forgot-link a:hover {
            color: rgba(0, 0, 0, 0.55);
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: rgba(0, 0, 0, 0.12);
            letter-spacing: 0.3px;
        }

        .footer a {
            color: rgba(0, 0, 0, 0.25);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: rgba(0, 0, 0, 0.50);
        }

        /* ─── Referral dropdown styles ─── */
        .referral-toggle-btn {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.50);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 0;
        }

        .referral-toggle-btn:hover {
            background: rgba(0, 0, 0, 0.06);
            color: #000000;
        }

        .referral-toggle-btn i {
            font-size: 14px;
        }

        .referral-dropdown {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
            opacity: 0;
            margin-top: 0;
        }

        .referral-dropdown.open {
            max-height: 180px;
            opacity: 1;
            margin-top: 14px;
        }

        .referral-dropdown .form-group {
            margin-bottom: 0;
        }

        .referral-msg {
            font-size: 13px;
            margin-top: 6px;
            min-height: 20px;
            color: rgba(0, 0, 0, 0.40);
            transition: color 0.3s ease;
        }

        @media (max-width: 600px) {
            .hero-logo {
                max-width: 90%;
            }
            .app-wrap {
                padding: 8px;
            }
            .brand h1 {
                font-size: 26px;
            }
            .btn-primary {
                font-size: 15px;
                padding: 14px;
            }
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }

        @media (max-width: 400px) {
            .brand h1 {
                font-size: 22px;
            }
            .hero-logo {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrap">

        <img class="hero-logo" src="bufferzone.png" alt="Buffer Zone logo" />

        <div class="brand">
            <h1>Buffer Zone</h1>
            <div class="sub">where pixels &amp; code create magic</div>
        </div>

        <div class="divider"></div>

        <!-- ═══ LOGIN VIEW ═══ -->
        <div id="loginView" class="view view--active">
            <form id="loginForm" autocomplete="off" style="width:100%;">
                <div class="form-group">
                    <span class="label">Email</span>
                    <div class="input-wrap">
                        <i class="fas fa-envelope icon"></i>
                        <input type="email" id="loginEmail" placeholder="Enter your email address" />
                    </div>
                </div>

                <div class="form-group">
                    <span class="label">Password</span>
                    <div class="input-wrap">
                        <i class="fas fa-lock icon"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" />
                        <button type="button" class="toggle-pass" id="toggleLoginPass">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="forgot-link">
                    <a id="forgotPasswordLink">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text">Sign In <i class="fas fa-arrow-right"></i></span>
                </button>

                <div class="status-msg" id="loginStatus">&#8203;</div>
            </form>

            <div class="toggle-link">
                <span>Don't have an account? </span>
                <a id="showSignup"><i class="fas fa-user-plus"></i> Create Account</a>
            </div>
        </div>

        <!-- ═══ SIGNUP VIEW ═══ -->
        <div id="signupView" class="view view--hidden">
            <form id="signupForm" autocomplete="off" style="width:100%;">
                <div class="form-row">
                    <div class="form-group">
                        <span class="label">First name</span>
                        <div class="input-wrap">
                            <i class="fas fa-user icon"></i>
                            <input type="text" id="firstName" placeholder="First name" />
                        </div>
                    </div>
                    <div class="form-group">
                        <span class="label">Last name</span>
                        <div class="input-wrap">
                            <i class="fas fa-user icon"></i>
                            <input type="text" id="lastName" placeholder="Last name" />
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <span class="label">Email</span>
                    <div class="input-wrap">
                        <i class="fas fa-envelope icon"></i>
                        <input type="email" id="signupEmail" placeholder="Enter your email address" />
                    </div>
                </div>

                <div class="form-group">
                    <span class="label">Phone number</span>
                    <div class="input-wrap">
                        <i class="fas fa-phone icon"></i>
                        <input type="tel" id="signupPhone" value="+260 " placeholder="+260 ..." />
                    </div>
                </div>

                <div class="form-group">
                    <span class="label">Password</span>
                    <div class="input-wrap">
                        <i class="fas fa-lock icon"></i>
                        <input type="password" id="signupPassword" placeholder="Create a password (min. 6 characters)" />
                        <button type="button" class="toggle-pass" id="toggleSignupPass">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <span class="label">Confirm password</span>
                    <div class="input-wrap">
                        <i class="fas fa-lock icon"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" />
                        <button type="button" class="toggle-pass" id="toggleConfirmPass">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- ═══ REFERRAL CODE – DROPDOWN BUTTON ═══ -->
                <div style="width:100%; margin-bottom:18px;">
                    <button type="button" class="referral-toggle-btn" id="referralToggleBtn">
                        <i class="fas fa-gift"></i>
                        <span>Have a referral code?</span>
                        <i class="fas fa-chevron-down" id="referralChevron" style="margin-left:auto; transition:transform 0.3s ease;"></i>
                    </button>
                    <div class="referral-dropdown" id="referralDropdown">
                        <div class="form-group">
                            <span class="label">Referral code</span>
                            <div class="input-wrap">
                                <i class="fas fa-tag icon"></i>
                                <input type="text" id="referralCode" placeholder="e.g. BZ-12ABC" />
                            </div>
                            <div class="referral-msg" id="referralMsg">&#8203;</div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="signupBtn">
                    <span class="btn-text">Create Account <i class="fas fa-arrow-right"></i></span>
                </button>

                <div class="status-msg" id="signupStatus">&#8203;</div>
            </form>

            <div class="toggle-link">
                <span>Already have an account? </span>
                <a id="showLogin"><i class="fas fa-arrow-right-to-bracket"></i> Sign In</a>
            </div>
        </div>

        <div class="footer">
            <span>&copy; 2026 Buffer Zone · </span>
            <a href="#">Privacy</a>
        </div>

    </div>

    <script type="module">
        // ─── Import modular SDK ───
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            sendPasswordResetEmail,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import {
            getDatabase,
            ref,
            set,
            serverTimestamp,
            get,
            query,
            orderByChild,
            equalTo,
            push
        } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // ─── Firebase config ───
        const firebaseConfig = {
            apiKey: "AIzaSyBy8ZAMagjX627gcfe0NuRaC1WfC736en0",
            authDomain: "bufferzone-63501.firebaseapp.com",
            databaseURL: "https://bufferzone-63501-default-rtdb.firebaseio.com",
            projectId: "bufferzone-63501",
            storageBucket: "bufferzone-63501.firebasestorage.app",
            messagingSenderId: "137881085889",
            appId: "1:137881085889:web:d5ff1ff3bee6d3e0373140",
            measurementId: "G-VRQHT301C4"
        };

        // ─── Init Firebase ───
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ─── DOM refs ───
        const loginView = document.getElementById('loginView');
        const signupView = document.getElementById('signupView');
        const showSignup = document.getElementById('showSignup');
        const showLogin = document.getElementById('showLogin');

        const loginForm = document.getElementById('loginForm');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const loginStatus = document.getElementById('loginStatus');
        const toggleLoginPass = document.getElementById('toggleLoginPass');
        const forgotLink = document.getElementById('forgotPasswordLink');

        const signupForm = document.getElementById('signupForm');
        const firstName = document.getElementById('firstName');
        const lastName = document.getElementById('lastName');
        const signupEmail = document.getElementById('signupEmail');
        const signupPhone = document.getElementById('signupPhone');
        const signupPassword = document.getElementById('signupPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const signupBtn = document.getElementById('signupBtn');
        const signupStatus = document.getElementById('signupStatus');
        const toggleSignupPass = document.getElementById('toggleSignupPass');
        const toggleConfirmPass = document.getElementById('toggleConfirmPass');

        // ─── Referral DOM elements ───
        const referralToggleBtn = document.getElementById('referralToggleBtn');
        const referralDropdown = document.getElementById('referralDropdown');
        const referralChevron = document.getElementById('referralChevron');
        const referralCodeInput = document.getElementById('referralCode');
        const referralMsg = document.getElementById('referralMsg');

        // ─── Prevent automatic redirects during signup ───
        let disableAuthRedirect = false;

        // ─── Helpers ───
        function showView(viewId) {
            const views = document.querySelectorAll('.view');
            views.forEach(v => {
                v.classList.remove('view--active');
                v.classList.add('view--hidden');
            });
            const target = document.getElementById(viewId);
            target.classList.remove('view--hidden');
            target.classList.add('view--active');
            // Clear status messages
            loginStatus.textContent = '\u200B';
            loginStatus.className = 'status-msg';
            signupStatus.textContent = '\u200B';
            signupStatus.className = 'status-msg';
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        function setupToggle(btn, input) {
            btn.addEventListener('click', () => {
                const isPass = input.type === 'password';
                input.type = isPass ? 'text' : 'password';
                const icon = btn.querySelector('i');
                icon.className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
            });
        }

        // ─── Toggle password visibility ───
        setupToggle(toggleLoginPass, loginPassword);
        setupToggle(toggleSignupPass, signupPassword);
        setupToggle(toggleConfirmPass, confirmPassword);

        // ─── View switching ───
        showSignup.addEventListener('click', (e) => {
            e.preventDefault();
            showView('signupView');
            firstName.focus();
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            showView('loginView');
            loginEmail.focus();
        });

        // ─── Clear status on input ───
        const clearLoginStatus = () => {
            loginStatus.className = 'status-msg';
            loginStatus.textContent = '\u200B';
        };
        loginEmail.addEventListener('input', clearLoginStatus);
        loginPassword.addEventListener('input', clearLoginStatus);

        const clearSignupStatus = () => {
            signupStatus.className = 'status-msg';
            signupStatus.textContent = '\u200B';
        };
        firstName.addEventListener('input', clearSignupStatus);
        lastName.addEventListener('input', clearSignupStatus);
        signupEmail.addEventListener('input', clearSignupStatus);
        signupPhone.addEventListener('input', clearSignupStatus);
        signupPassword.addEventListener('input', clearSignupStatus);
        confirmPassword.addEventListener('input', clearSignupStatus);

        // ─── Forgot password ───
        forgotLink.addEventListener('click', async (e) => {
            e.preventDefault();
            const email = loginEmail.value.trim();
            if (!email || !email.includes('@') || !email.includes('.')) {
                loginStatus.textContent = '⚠️ Please enter a valid email address to reset your password.';
                loginStatus.className = 'status-msg error';
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                loginStatus.textContent = '✅ Password reset email sent to ' + email + '.';
                loginStatus.className = 'status-msg success';
            } catch (error) {
                let msg = '⚠️ ' + error.message;
                if (error.code === 'auth/user-not-found') msg = '⚠️ No account found with this email.';
                loginStatus.textContent = msg;
                loginStatus.className = 'status-msg error';
            }
        });

        // ─── Login ───
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = loginEmail.value.trim();
            const pass = loginPassword.value;

            loginStatus.className = 'status-msg';
            loginStatus.textContent = '\u200B';

            if (!email || !email.includes('@') || !email.includes('.')) {
                loginStatus.textContent = '⚠️ Please enter a valid email address.';
                loginStatus.className = 'status-msg error';
                loginEmail.focus();
                return;
            }
            if (!pass || pass.length < 6) {
                loginStatus.textContent = '⚠️ Password must be at least 6 characters.';
                loginStatus.className = 'status-msg error';
                loginPassword.focus();
                return;
            }

            setLoading(loginBtn, true);

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                disableAuthRedirect = false;
            } catch (error) {
                setLoading(loginBtn, false);
                let msg = '⚠️ ' + error.message;
                if (error.code === 'auth/user-not-found') msg = '⚠️ No account found with this email. Please create an account.';
                else if (error.code === 'auth/wrong-password') msg = '⚠️ Incorrect password. Please try again.';
                else if (error.code === 'auth/invalid-email') msg = '⚠️ Invalid email address.';
                else if (error.code === 'auth/too-many-requests') msg = '⚠️ Too many failed attempts. Please wait.';
                else if (error.code === 'auth/network-request-failed') msg = '⚠️ Network error. Check your connection.';
                loginStatus.textContent = msg;
                loginStatus.className = 'status-msg error';
            }
        });

        // ─── Referral dropdown toggle ───
        referralToggleBtn.addEventListener('click', () => {
            const isOpen = referralDropdown.classList.contains('open');
            if (isOpen) {
                referralDropdown.classList.remove('open');
                referralChevron.style.transform = 'rotate(0deg)';
                referralToggleBtn.querySelector('span').textContent = 'Have a referral code?';
            } else {
                referralDropdown.classList.add('open');
                referralChevron.style.transform = 'rotate(180deg)';
                referralToggleBtn.querySelector('span').textContent = 'Close referral code';
                referralCodeInput.focus();
            }
        });

        // ─── Referral code generation ───
        function generateRandomReferralCode() {
            const digits = Math.floor(10 + Math.random() * 90);
            const letters = String.fromCharCode(
                65 + Math.floor(Math.random() * 26),
                65 + Math.floor(Math.random() * 26),
                65 + Math.floor(Math.random() * 26)
            );
            return `BZ-${digits}${letters}`;
        }

        async function referralCodeExists(code) {
            const usersRef = ref(db, 'users');
            const q = query(usersRef, orderByChild('referralCode'), equalTo(code));
            const snapshot = await get(q);
            return snapshot.exists();
        }

        async function generateUniqueReferralCode() {
            for (let attempt = 0; attempt < 10; attempt++) {
                const code = generateRandomReferralCode();
                if (!(await referralCodeExists(code))) {
                    return code;
                }
            }
            throw new Error('Could not generate a unique referral code after 10 attempts.');
        }

        async function lookupReferralCode(code) {
            const usersRef = ref(db, 'users');
            const q = query(usersRef, orderByChild('referralCode'), equalTo(code));
            const snapshot = await get(q);
            if (!snapshot.exists()) return null;
            let referrerUid = null;
            let referrerData = null;
            snapshot.forEach(child => {
                referrerUid = child.key;
                referrerData = child.val();
            });
            return { uid: referrerUid, ...referrerData };
        }

        // ─── Referral code live validation ───
        let referralCheckTimeout = null;
        referralCodeInput.addEventListener('input', function() {
            clearTimeout(referralCheckTimeout);
            const code = this.value.trim().toUpperCase();
            if (code === '') {
                referralMsg.textContent = '\u200B';
                referralMsg.style.color = 'rgba(0,0,0,0.40)';
                return;
            }
            if (!/^BZ-[A-Z0-9]{5}$/.test(code)) {
                referralMsg.textContent = 'Format should be BZ-XXXXX (e.g. BZ-12ABC)';
                referralMsg.style.color = '#c92a2a';
                return;
            }
            referralCheckTimeout = setTimeout(async () => {
                try {
                    const referrer = await lookupReferralCode(code);
                    if (referrer && referrer.uid) {
                        const name = [referrer.firstName, referrer.lastName].filter(Boolean).join(' ');
                        referralMsg.textContent = `This referral code belongs to ${name}`;
                        referralMsg.style.color = '#2b8a3e';
                    } else {
                        referralMsg.textContent = 'Invalid referral code';
                        referralMsg.style.color = '#c92a2a';
                    }
                } catch (error) {
                    referralMsg.textContent = 'Error checking referral code';
                    referralMsg.style.color = '#c92a2a';
                    console.error('Referral lookup error:', error);
                }
            }, 600);
        });

        // ─── Signup ───
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fName = firstName.value.trim();
            const lName = lastName.value.trim();
            const email = signupEmail.value.trim();
            const phone = signupPhone.value.trim();
            const pass = signupPassword.value;
            const confirm = confirmPassword.value;
            const referralCodeEntered = referralCodeInput.value.trim().toUpperCase();

            signupStatus.className = 'status-msg';
            signupStatus.textContent = '\u200B';

            if (!fName || fName.length < 1) {
                signupStatus.textContent = '⚠️ First name is required.';
                signupStatus.className = 'status-msg error';
                firstName.focus();
                return;
            }
            if (!lName || lName.length < 1) {
                signupStatus.textContent = '⚠️ Last name is required.';
                signupStatus.className = 'status-msg error';
                lastName.focus();
                return;
            }
            if (!email || !email.includes('@') || !email.includes('.')) {
                signupStatus.textContent = '⚠️ Please enter a valid email address.';
                signupStatus.className = 'status-msg error';
                signupEmail.focus();
                return;
            }
            if (!phone || phone.length < 6) {
                signupStatus.textContent = '⚠️ Please enter a valid phone number.';
                signupStatus.className = 'status-msg error';
                signupPhone.focus();
                return;
            }
            if (!pass || pass.length < 6) {
                signupStatus.textContent = '⚠️ Password must be at least 6 characters.';
                signupStatus.className = 'status-msg error';
                signupPassword.focus();
                return;
            }
            if (pass !== confirm) {
                signupStatus.textContent = '⚠️ Passwords do not match.';
                signupStatus.className = 'status-msg error';
                confirmPassword.focus();
                return;
            }

            // Validate referral code if provided
            let referrerUid = null;
            if (referralCodeEntered !== '') {
                try {
                    const referrer = await lookupReferralCode(referralCodeEntered);
                    if (referrer && referrer.uid) {
                        referrerUid = referrer.uid;
                    } else {
                        signupStatus.textContent = '⚠️ Invalid referral code. Please check or leave empty.';
                        signupStatus.className = 'status-msg error';
                        referralCodeInput.focus();
                        return;
                    }
                } catch (error) {
                    signupStatus.textContent = '⚠️ Error validating referral code. Please try again.';
                    signupStatus.className = 'status-msg error';
                    console.error('Referral validation error:', error);
                    return;
                }
            }

            setLoading(signupBtn, true);
            disableAuthRedirect = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                await user.getIdTokenResult(true);

                const newReferralCode = await generateUniqueReferralCode();

                const userData = {
                    firstName: fName,
                    lastName: lName,
                    email: email,
                    phone: phone,
                    role: email.startsWith('admin@') ? 'admin' : 'customer',
                    createdAt: serverTimestamp(),
                    banned: false,
                    referralCode: newReferralCode
                };
                if (referrerUid) {
                    userData.referredBy = referrerUid;
                }

                const userRef = ref(db, 'users/' + user.uid);
                await set(userRef, userData);

                // Record referral for the referrer
                if (referrerUid) {
                    const referrerRef = ref(db, 'users/' + referrerUid + '/referrals');
                    await push(referrerRef, {
                        newUserName: `${fName} ${lName}`,
                        newUserEmail: email,
                        newUserUid: user.uid,
                        timestamp: serverTimestamp()
                    });
                }

                await signOut(auth);
                window.location.href = 'login.html?signup=success';
            } catch (error) {
                setLoading(signupBtn, false);
                disableAuthRedirect = false;

                let msg;
                if (error.code === 'auth/email-already-in-use') {
                    msg = '⚠️ This email is already registered. Please sign in instead.';
                } else if (error.code === 'auth/weak-password') {
                    msg = '⚠️ Password is too weak. Use at least 6 characters.';
                } else if (error.code === 'auth/invalid-email') {
                    msg = '⚠️ Invalid email address.';
                } else if (error.code === 'auth/network-request-failed') {
                    msg = '⚠️ Network error. Check your connection.';
                } else if (error.code === 'PERMISSION_DENIED') {
                    msg = '⚠️ Unable to save registration data. Please check your Firebase database rules.';
                } else {
                    msg = '⚠️ Registration data could not be saved: ' + (error.message || 'Unknown error');
                }

                if (auth.currentUser) {
                    await signOut(auth);
                }

                signupStatus.textContent = msg;
                signupStatus.className = 'status-msg error';
            } finally {
                if (disableAuthRedirect) {
                    disableAuthRedirect = false;
                }
            }
        });

        // ─── Auth state listener ───
        onAuthStateChanged(auth, (user) => {
            if (disableAuthRedirect) return;
            if (user) {
                const email = user.email;
                if (email && email.startsWith('admin@')) {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'home.html';
                }
            }
        });

        // ─── Check for signup success message ───
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('signup') === 'success') {
            showView('loginView');
            loginStatus.textContent = '✅ Account created successfully! Please log in.';
            loginStatus.className = 'status-msg success';
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // ─── Initial focus ───
        loginEmail.focus();

        console.log('🔥 Buffer Zone login ready — Firebase modular SDK connected.');
    </script>

    <!-- Service worker registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('✅ Service Worker registered'))
                .catch(err => console.warn('Service Worker registration failed:', err));
        }
    </script>

    <!-- Install banner -->
    <style>
        .install-banner {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000;
            color: #ffffff;
            display: none;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            z-index: 1000;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            max-width: 90vw;
        }
        .install-banner .install-logo {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }
        .install-banner #installBtn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .install-banner #dismissInstall {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            margin-left: 4px;
        }
    </style>

    <div id="installBanner" class="install-banner">
        <img src="bufferzone.png" alt="logo" class="install-logo">
        <span>Install BUFFER ZONE</span>
        <button id="installBtn">Install</button>
        <button id="dismissInstall">&times;</button>
    </div>

    <script>
        (function() {
            const banner = document.getElementById('installBanner');
            const installBtn = document.getElementById('installBtn');
            const dismissBtn = document.getElementById('dismissInstall');
            let deferredPrompt = null;

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                banner.style.display = 'flex';
            });

            installBtn.addEventListener('click', () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('✅ User accepted the install prompt');
                    }
                    deferredPrompt = null;
                    banner.style.display = 'none';
                });
            });

            dismissBtn.addEventListener('click', () => {
                banner.style.display = 'none';
            });

            window.addEventListener('appinstalled', () => {
                banner.style.display = 'none';
                deferredPrompt = null;
                console.log('🎉 App was installed');
            });
        })();
    </script>

</body>
</html>
